<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>LinkVault - Offline Secure Link Manager</title>
    <meta name="description"
        content="LinkVault is an offline secure link manager to save, organize, and manage links with password protection, tags, favorites, and reminders. Works offline as a PWA.">
    <meta name="keywords"
        content="link manager, bookmark manager, offline bookmark app, link vault, save links offline, pwa link manager, bookmark organizer">
    <meta name="author" content="urnjoya">
    <meta name="robots" content="index, follow">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <!-- PWA -->
<link rel="manifest" href="app/manifest.json">
<meta name="theme-color" content="#111111">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
    <!-- Favicon -->
    <link rel="icon" href="assets/favicon.ico" sizes="any">
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
    <link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="LinkVault – Offline Secure Link Manager">
    <meta property="og:description"
        content="Save and organize your links securely with password protection, tags, favorites and offline support.">
    <meta property="og:image" content="assets/preview.png">

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="LinkVault – Offline Link Manager">
    <meta name="twitter:description" content="Secure offline bookmark manager with tags, favorites and reminders.">
    <meta name="twitter:image" content="assets/preview.png">
    <!-- PRELOAD -->
    <link rel="preload" href="css/style.css" as="style">
    <link rel="preload" href="css/dark.css" as="style">
    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dark.css">
</head>
<body>

    <!-- LOCK SCREEN -->
    <section id="lockScreen" class="page">
        <div class="centerBox">
            <h2>Enter Password</h2>
            <input type="password" id="lockPassword">
            <button class="btn btn-primary" onclick="unlockApp()">Unlock</button>
        </div>
    </section>

    <!-- LOGIN / CREATE ACCOUNT -->
    <section id="loginPage" class="page">
        <div class="centerBox">
            <h2>Welcome to Link Vault</h2>
            <button class="btn btn-primary" onclick="showCreateAccount()">Create Account</button>
            <button class="btn btn-secondary" onclick="showRecovery()">Recover Account</button>
        </div>
    </section>

    <!-- CREATE ACCOUNT -->
    <section id="createAccountPage" class="page">
        <div class="formBox">
            <h2>Create Account</h2>
            <hr>
            <label for="name">Name</label>
            <input type="text" id="name" placeholder="asmith">
            <label for="gender">Gender</label><br>
            <select id="gender">
                <option>Male</option>
                <option>Female</option>
            </select>
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="algpt@7845">
            <label for="securityQuestion">Security Questions</label>
            <select id="securityQuestion">
                <option>Pet name?</option>
                <option>Favorite color?</option>
                <option>Birth city?</option>
            </select>
            <input type="text" id="securityAnswer" placeholder="Answer">
            <button class="btn btn-success" onclick="createAccount()">Create</button>
            <button class="btn btn-secondary" onclick="goToLogin()">Back</button>
        </div>
    </section>

    <!-- DASHBOARD -->
    <section id="dashboardPage" class="page">

        <!-- NAVBAR -->
        <nav class="navbar">
            <div class="navLeft">
                <h3><a href=""> LinkVault </a></h3>
            </div>

            <div class="navCenter">
                <input type="text" id="searchBar" placeholder="Search links..." onkeyup="searchLinks()">
            </div>

            <div class="navRight">
                <button class="btn btn-primary" onclick="showAddPopup()">Add</button>
                <button class="btn btn-ghost" onclick="toggleDarkMode()">Dark</button>
                <button class="btn btn-danger" onclick="lockApp()">Lock</button>
            </div>
        </nav>


        <!-- TABS -->
        <div class="tabs">
            <button class="activeTabBtn btn btn-tab" onclick="showTab('linksTab', this)">Links</button>
            <button class="btn btn-tab" onclick="showTab('instagramTab', this)">Instagram</button>
            <button class="btn btn-tab" onclick="showTab('favoritesTab', this)">Favorites</button>
            <button class="btn btn-tab" onclick="showTab('categoriesTab', this)">Categories</button>
            <button class="btn btn-tab" onclick="showTab('tagsTab', this)">Tags</button>
            <button class="btn btn-tab" onclick="showTab('historyTab', this)">History</button>
            <button class="btn btn-tab" onclick="showTab('profileTab', this)">Profile</button>
            <button class="btn btn-tab btn-warning" onclick="exportAllData()">Export Data</button>
            <button class="btn btn-tab btn-warning" onclick="importFromInput()">Import Data</button>
            <button class="btn btn-tab" onclick="showTab('settingsTab', this)">Settings</button>
        </div>

        <!-- TAB CONTENT -->
        <div class="tabContent">

            <div id="linksTab" class="tabPage">
                <div id="cardsContainer"></div>
            </div>

            <div id="instagramTab" class="tabPage">
                <div id="instagramContainer"></div>
            </div>

            <div id="favoritesTab" class="tabPage">
                <div id="favoritesContainer"></div>
            </div>

            <div id="categoriesTab" class="tabPage">
                <div id="categoriesContainer"></div>
            </div>

            <div id="tagsTab" class="tabPage">
                <div id="tagsContainer"></div>
            </div>

            <div id="historyTab" class="tabPage">
                <canvas id="visitGraph" width="300" height="150"></canvas>
            </div>

            <div id="profileTab" class="tabPage">
                <h3>Profile</h3>
                <div id="profileData"></div>
            </div>

            <div id="exportTab" class="tabPage">
                <button onclick="exportData()">Export Data</button>
            </div>

            <div id="importTab" class="tabPage">
                <input type="file" id="importFile">
                <button onclick="importData()">Import Data</button>
            </div>

            <div id="settingsTab" class="tabPage">
                <h3>Settings</h3>
                                <div class="settingsBox">

                    <button class="btn btn-secondary" onclick="lockApp()">Lock App</button>

                    <button class="btn btn-warning" onclick="resetPassword()">Change Password</button>

                    <button class="btn btn-primary" onclick="exportData()">Export Data</button>

                    <button class="btn btn-primary" onclick="importData()">Import Data</button>

                    <button class="btn btn-success" onclick="checkForUpdates()">Check Updates</button>

                    <button class="btn btn-danger" onclick="logout()">Logout</button>

                    <button class="btn btn-danger" onclick="clearAllData()">Clear All Data</button>

                </div>
            </div>

        </div>
    </section>

    <!-- ADD LINK POPUP -->
    <div id="addPopup" class="popup">
        <div class="popupBox">
            <h3>Add Link</h3>

            <input type="text" id="linkURL" placeholder="URL (required)">
            <input type="text" id="linkTitle" placeholder="Title">
            <input type="text" id="linkImage" placeholder="Image URL">
            <input type="text" id="linkCategory" placeholder="Category">
            <input type="text" id="linkTags" placeholder="Tags comma separated">

            <button class="btn btn-success" onclick="addLink()">Save</button>
            <button class="btn btn-secondary" onclick="closeAddPopup()">Cancel</button>
        </div>
    </div>
    <div id="notificationContainer"></div>
        <div id="loaderOverlay" class="loaderOverlay hidden">
        <div class="loaderBox">
            <div class="loaderText" id="loaderText">Processing...</div>
            <div class="progressBar">
                <div class="progressFill" id="progressFill"></div>
            </div>
        </div>
    </div>
    <script src="js/app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('app/service-worker.js')
                .then(() => console.log("Service Worker Registered"));
        }
    </script>
</body>
</html>
